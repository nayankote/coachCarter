<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoachCarter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f6f3;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #ffffff;
      border-bottom: 1px solid #e8e6e0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 17px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.3px; }
    .header-week { font-size: 14px; font-weight: 500; color: #5a5a5a; }
    .header-nav { display: flex; gap: 6px; align-items: center; }
    .nav-btn {
      background: #f0ede8; border: 1px solid #e0ddd8; color: #3a3a3a;
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
      transition: background 0.12s;
    }
    .nav-btn:hover { background: #e8e4de; }
    .nav-btn.today { background: #1a1a1a; color: #ffffff; border-color: #1a1a1a; }
    .nav-btn.today:hover { background: #333; }

    /* ── Summary pills (in week header row) ── */
    .week-summary { display: flex; gap: 8px; }
    .summary-pill {
      display: flex; align-items: center; gap: 6px;
      background: #f7f6f3; border: 1px solid #e8e6e0; border-radius: 20px;
      padding: 4px 12px; white-space: nowrap; font-size: 12px;
    }
    .summary-pill .icon { font-size: 13px; }
    .summary-pill .label { color: #888; text-transform: capitalize; }
    .summary-pill .value { font-weight: 600; color: #1a1a1a; }
    .summary-pill .planned { color: #aaa; margin-left: 2px; }

    /* ── Calendar grid ── */
    .calendar-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 20px 60px;
    }

    .week-section { margin-bottom: 28px; }
    .week-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; padding-left: 2px;
    }
    .week-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: #999;
    }
    .week-label.current-week { color: #1a1a1a; }
    .week-stats { display: flex; gap: 12px; }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #e8e6e0;
      border-radius: 10px;
      overflow: hidden;
    }

    .day-col {
      background: #f7f6f3;
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }
    .day-col.today { background: #ffffff; }
    .day-col.today .day-header { border-bottom-color: #1a1a1a; }

    .day-header {
      padding: 10px 8px 8px;
      border-bottom: 2px solid #e8e6e0;
      text-align: center;
      background: inherit;
    }
    .day-name { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #999; font-weight: 500; }
    .day-date { font-size: 20px; font-weight: 700; color: #1a1a1a; line-height: 1.2; }
    .day-date.today-date {
      background: #1a1a1a;
      color: #ffffff;
      border-radius: 50%;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      margin: 2px auto 0;
      font-size: 16px;
    }

    .day-sessions { padding: 8px 6px; display: flex; flex-direction: column; gap: 5px; flex: 1; }

    /* ── Workout cards ── */
    .workout-card {
      border-radius: 7px;
      padding: 9px 10px 8px;
      cursor: pointer;
      transition: box-shadow 0.12s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .workout-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
    .workout-card:active { transform: translateY(0); }

    /* Card status colours */
    .card-planned-future { background: #fff; border: 1.5px dashed #d1d5db; color: #6b7280; }
    .card-planned-missed { background: #fef2f2; border: 1.5px dashed #fca5a5; color: #991b1b; }
    .card-complete-good  { background: #f0fdf4; border: 1px solid #86efac; color: #166534; }
    .card-complete-ok    { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }
    .card-complete-poor  { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
    .card-awaiting       { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }
    .card-unplanned      { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }

    /* Card header row: sport icon + session type label */
    .card-header { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .card-sport  { font-size: 13px; line-height: 1; }
    .card-type   { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.65; }

    /* Hero duration */
    .card-duration { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }

    /* Secondary metric row */
    .card-metrics { font-size: 11px; font-weight: 500; margin-top: 3px; opacity: 0.8; }

    /* WhatsApp-style ticks — bottom right of card */
    .card-ticks { position: absolute; bottom: 7px; right: 8px; font-size: 12px; letter-spacing: -2px; line-height: 1; }
    .tick-sent     { color: #9ca3af; } /* grey  — awaiting feedback */
    .tick-received { color: #3b82f6; } /* blue  — feedback received */

    /* ── Center modal ── */
    .panel-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 20;
      opacity: 0; pointer-events: none;
      transition: opacity 0.18s;
      display: flex; align-items: center; justify-content: center;
    }
    .panel-overlay.open { opacity: 1; pointer-events: all; }

    .detail-panel {
      background: #ffffff;
      border-radius: 14px;
      width: 520px; max-width: calc(100vw - 32px);
      max-height: 82vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      transform: scale(0.96) translateY(8px);
      transition: transform 0.18s cubic-bezier(0.4,0,0.2,1), opacity 0.18s;
      opacity: 0;
    }
    .panel-overlay.open .detail-panel { transform: scale(1) translateY(0); opacity: 1; }

    .panel-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #e8e6e0;
      position: sticky; top: 0; background: #ffffff; z-index: 1;
      border-radius: 14px 14px 0 0;
    }
    .panel-sport-icon { font-size: 26px; margin-right: 12px; }
    .panel-title-block { flex: 1; }
    .panel-title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .panel-subtitle { font-size: 12px; color: #888; margin-top: 2px; }
    .panel-close {
      background: none; border: none; color: #aaa; font-size: 18px;
      cursor: pointer; padding: 0 0 0 12px; line-height: 1;
    }
    .panel-close:hover { color: #1a1a1a; }

    .panel-body { padding: 16px 20px 20px; }
    .panel-section { margin-bottom: 20px; }
    .panel-section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #aaa; font-weight: 600; margin-bottom: 10px;
    }


    /* Planned vs actual comparison */
    .pva-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pva-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; font-weight: 600; padding: 0 0 6px; text-align: left; }
    .pva-table th:not(:first-child) { text-align: right; }
    .pva-table td { padding: 5px 0; border-top: 1px solid #f0ede8; color: #3a3a3a; }
    .pva-table td:not(:first-child) { text-align: right; font-weight: 600; }
    .pva-table td:first-child { color: #888; }
    .val-good { color: #16a34a; }
    .val-poor { color: #dc2626; }

    .compliance-bar-wrap { background: #f7f6f3; border: 1px solid #e8e6e0; border-radius: 8px; padding: 14px; }
    .compliance-score-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .compliance-score-num { font-size: 32px; font-weight: 800; }
    .compliance-score-num.good { color: #16a34a; }
    .compliance-score-num.ok   { color: #d97706; }
    .compliance-score-num.poor { color: #dc2626; }
    .compliance-label { font-size: 11px; color: #aaa; }
    .compliance-bar-bg { background: #e8e6e0; border-radius: 4px; height: 5px; overflow: hidden; }
    .compliance-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .compliance-bar-fill.good { background: #22c55e; }
    .compliance-bar-fill.ok   { background: #f59e0b; }
    .compliance-bar-fill.poor { background: #ef4444; }

    .coaching-report {
      background: #f7f6f3; border: 1px solid #e8e6e0; border-radius: 8px; padding: 14px;
      line-height: 1.65; color: #3a3a3a; font-size: 13px;
      white-space: pre-wrap;
    }
    .coaching-report-empty { color: #bbb; font-style: italic; font-size: 13px; }

    .feedback-box {
      background: #f7f6f3; border: 1px solid #e8e6e0; border-radius: 8px; padding: 14px;
      font-size: 13px; color: #666; line-height: 1.55;
      white-space: pre-wrap;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      border: 1px solid transparent;
    }
    .badge-complete  { background: #edfaf2; color: #166534; border-color: #86efac; }
    .badge-awaiting  { background: #fff7ed; color: #9a3412; border-color: #fdba74; }
    .badge-unplanned { background: #f3f4f6; color: #6b7280; border-color: #d1d5db; }

    @media (max-width: 700px) {
      .calendar { grid-template-columns: 1fr; }
      .day-col:not(.today) { display: none; }
      .detail-panel { width: 100vw; }
      .week-summary { gap: 8px; }
      .calendar-wrap { padding: 10px 10px 30px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title">CoachCarter</div>
    <div class="header-nav">
      <button class="nav-btn today" id="todayBtn">Today</button>
    </div>
  </header>

  <div class="calendar-wrap" id="calendarWrap">
  </div>

  <div class="panel-overlay" id="overlay">
    <aside class="detail-panel" id="detailPanel">
      <div class="panel-header">
        <div style="display:flex;align-items:center">
          <span class="panel-sport-icon" id="panelIcon"></span>
          <div class="panel-title-block">
            <div class="panel-title" id="panelTitle"></div>
            <div class="panel-subtitle" id="panelSubtitle"></div>
          </div>
        </div>
        <button class="panel-close" id="panelClose">&#x2715;</button>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </aside>
  </div>

  <script>
const SPORT_ICON = { bike: '🚴', run: '🏃', swim: '🏊', strength: '💪', walking: '🚶', multi_sport: '🏅' };
function sportIcon(sport) { return SPORT_ICON[sport] ?? '🏷️'; }
const KNOWN_SPORTS = new Set(['bike','run','swim','strength','walking','multi_sport']);
const DAY_OFFSET = { monday:0, tuesday:1, wednesday:2, thursday:3, friday:4, saturday:5, sunday:6 };
const DAY_NAMES  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

let plan = null;
let workouts = [];
let todayWeekEl = null;

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0, 0, 0, 0);
  return dt;
}

function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  dt.setHours(0, 0, 0, 0);
  return dt;
}

function toYMD(d) {
  // Use local date parts — toISOString() returns UTC, wrong for positive-offset timezones (e.g. IST +5:30)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatWeekLabel(monday) {
  const sunday = addDays(monday, 6);
  const opts = { month: 'short', day: 'numeric' };
  return `${monday.toLocaleDateString('en-US', opts)} – ${sunday.toLocaleDateString('en-US', { ...opts, year: 'numeric' })}`;
}

function buildPlanMap(plan) {
  const map = {};
  const start = new Date(plan.plan_start_date + 'T00:00:00');
  for (const week of plan.weeks) {
    const weekStart = addDays(start, (week.week - 1) * 7);
    for (const session of week.sessions) {
      const offset = DAY_OFFSET[session.day.toLowerCase()] ?? 0;
      const date = toYMD(addDays(weekStart, offset));
      if (!map[date]) map[date] = [];
      map[date].push({ ...session, _week: week.week, _weekLabel: week.label });
    }
  }
  return map;
}

function buildWorkoutMap(workouts) {
  const map = {};
  for (const w of workouts) {
    if (!map[w.date]) map[w.date] = [];
    map[w.date].push(w);
  }
  return map;
}

function cardClass(workout, dateYmd) {
  if (!workout) {
    const today = toYMD(new Date());
    return dateYmd > today ? 'card-planned-future' : 'card-planned-missed';
  }
  if (workout.status === 'awaiting_feedback' || workout.status === 'processing') return 'card-awaiting';
  if (workout.status === 'complete') {
    const s = workout.compliance_score;
    if (s == null) return 'card-complete-good';
    if (s >= 80) return 'card-complete-good';
    if (s >= 60) return 'card-complete-ok';
    return 'card-complete-poor';
  }
  return 'card-unplanned';
}

function formatPace(sec) {
  const m = Math.floor(sec / 60), s = Math.round(sec % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function fmtDuration(min) {
  if (!min) return '—';
  const h = Math.floor(min / 60), m = Math.round(min % 60);
  return h > 0 ? `${h}:${String(m).padStart(2, '0')}` : `${m}min`;
}

function sessionTypeLabel(sport, type, activityName) {
  // Unknown sport: use Garmin's activity name directly
  if (sport && !KNOWN_SPORTS.has(sport)) return activityName || sport.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  const sportName = sport ? sport.charAt(0).toUpperCase() + sport.slice(1) : '';
  if (!type || type === sport) return activityName && !KNOWN_SPORTS.has(sport) ? activityName : sportName;
  const typePart = type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  // Avoid "Bike Bike" — only prepend sport if type doesn't already start with it
  if (typePart.toLowerCase().startsWith(sport?.toLowerCase() ?? '')) return typePart;
  return `${sportName} ${typePart}`;
}

// Returns [durationStr, secondaryMetricStr, badgeStr]
function cardParts(workout, session) {
  if (!workout) {
    // Planned, not yet done
    const dur = fmtDuration(session?.duration_min);
    let secondary = '';
    if (session?.sport === 'bike' && session.targets?.tss_target) secondary = `${session.targets.tss_target} TSS`;
    if (session?.sport === 'swim' && session.targets?.total_distance_m) secondary = `${session.targets.total_distance_m}m`;
    return [dur, secondary, ''];
  }
  const w = workout;
  const dur = fmtDuration(w.duration_min);
  let secondary = '';
  if (w.sport === 'bike') {
    const parts = [];
    if (w.normalized_power) parts.push(`${w.normalized_power}W`);
    if (w.tss) parts.push(`${Math.round(w.tss)} TSS`);
    secondary = parts.join(' · ');
  } else if (w.sport === 'run') {
    const parts = [];
    if (w.avg_pace_sec) parts.push(`${formatPace(w.avg_pace_sec)}/km`);
    if (w.avg_hr) parts.push(`${w.avg_hr}bpm`);
    secondary = parts.join(' · ');
  } else if (w.sport === 'swim') {
    const parts = [];
    if (w.distance_km) parts.push(`${(w.distance_km * 1000).toFixed(0)}m`);
    if (w.avg_pace_sec) parts.push(`${formatPace(w.avg_pace_sec)}/100m`);
    secondary = parts.join(' · ');
  } else if (w.sport === 'strength') {
    if (w.calories) secondary = `${w.calories} kcal`;
  } else {
    // Unknown sport (walking, multi_sport, etc.)
    const parts = [];
    if (w.distance_km) parts.push(`${w.distance_km.toFixed(1)} km`);
    if (w.avg_hr) parts.push(`${w.avg_hr} bpm`);
    secondary = parts.join(' · ');
  }
  return [dur, secondary];
}

function render() {
  if (!plan) return;
  const planMap    = buildPlanMap(plan);
  const workoutMap = buildWorkoutMap(workouts);
  const today      = toYMD(new Date());

  const wrap = document.getElementById('calendarWrap');
  wrap.innerHTML = '';
  todayWeekEl = null;

  // Range: from earliest data to 2 weeks past today
  const planStart = new Date(plan.plan_start_date + 'T00:00:00');
  const allDates  = workouts.map(w => new Date(w.date + 'T00:00:00')).filter(d => !isNaN(d));
  const earliest  = allDates.length ? new Date(Math.min(planStart, ...allDates)) : planStart;
  const latest    = addDays(new Date(), 14);

  let weekMonday = getMonday(earliest);

  while (weekMonday <= latest) {
    const weekEnd = addDays(weekMonday, 6);
    const containsToday = today >= toYMD(weekMonday) && today <= toYMD(weekEnd);
    const summaryData = { bike:{planned:0,actual:0}, run:{planned:0,actual:0}, swim:{planned:0,actual:0}, strength:{planned:0,actual:0} };

    const section = document.createElement('div');
    section.className = 'week-section';
    if (containsToday) { section.id = 'currentWeek'; todayWeekEl = section; }

    const header = document.createElement('div');
    header.className = 'week-header';
    const labelEl = document.createElement('div');
    labelEl.className = 'week-label' + (containsToday ? ' current-week' : '');
    labelEl.textContent = formatWeekLabel(weekMonday);
    header.appendChild(labelEl);
    header.appendChild(document.createElement('div')); // placeholder for stats (filled after grid)
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'calendar';

    for (let i = 0; i < 7; i++) {
      const date        = addDays(weekMonday, i);
      const ymd         = toYMD(date);
      const isToday     = ymd === today;
      const sessions    = planMap[ymd] || [];
      const dayWorkouts = workoutMap[ymd] || [];

      for (const s of sessions)    { if (summaryData[s.sport]) summaryData[s.sport].planned += s.duration_min || 0; }
      for (const w of dayWorkouts) { if (summaryData[w.sport]) summaryData[w.sport].actual  += w.duration_min || 0; }

      const col = document.createElement('div');
      col.className = 'day-col' + (isToday ? ' today' : '');

      const dayNum = date.getDate();
      const dateEl = isToday
        ? `<div class="day-date today-date">${dayNum}</div>`
        : `<div class="day-date">${dayNum}</div>`;

      col.innerHTML = `
        <div class="day-header">
          <div class="day-name">${DAY_NAMES[i].slice(0, 3)}</div>
          ${dateEl}
        </div>
        <div class="day-sessions"></div>
      `;
      grid.appendChild(col);

      const sessionsEl = col.querySelector('.day-sessions');
      const matchedIds = new Set();

      for (const session of sessions) {
        const matched = dayWorkouts.find(w => w.plan_session_id === session.id && !matchedIds.has(w.id));
        if (matched) matchedIds.add(matched.id);
        renderCard(sessionsEl, session, matched || null, ymd);
      }
      for (const w of dayWorkouts) {
        if (!matchedIds.has(w.id)) renderCard(sessionsEl, null, w, ymd);
      }
    }

    section.appendChild(grid);
    renderWeekSummary(section, summaryData);
    wrap.appendChild(section);
    weekMonday = addDays(weekMonday, 7);
  }

  // Scroll to current week after paint
  if (todayWeekEl) setTimeout(() => todayWeekEl.scrollIntoView({ block: 'start' }), 50);
}

function cardTicks(workout) {
  if (!workout) return '';
  if (workout.status === 'complete') return '<span class="card-ticks tick-received">✓✓</span>';
  if (workout.status === 'awaiting_feedback' || workout.status === 'processing') return '<span class="card-ticks tick-sent">✓</span>';
  return '';
}

function renderCard(container, session, workout, dateYmd) {
  const sport = workout?.sport ?? session?.sport ?? 'bike';
  const icon  = sportIcon(sport);
  const cls   = cardClass(workout, dateYmd);
  const typeLabel = session ? sessionTypeLabel(session.sport, session.type, null)
                            : sessionTypeLabel(workout?.sport, null, workout?.activity_name);
  const [dur, secondary] = cardParts(workout, session ?? { sport, duration_min: workout?.duration_min, targets: {} });

  const card = document.createElement('div');
  card.className = `workout-card ${cls}`;
  card.innerHTML = `
    ${cardTicks(workout)}
    <div class="card-header">
      <span class="card-sport">${icon}</span>
      <span class="card-type">${esc(typeLabel)}</span>
    </div>
    <div class="card-duration">${esc(dur)}</div>
    ${secondary ? `<div class="card-metrics">${esc(secondary)}</div>` : ''}
  `;
  card.addEventListener('click', () => openPanel(session, workout));
  container.appendChild(card);
}

function renderWeekSummary(section, data) {
  const sports = Object.entries(data).filter(([, v]) => v.planned > 0 || v.actual > 0);
  if (!sports.length) return;
  const strip = document.createElement('div');
  strip.className = 'week-summary';
  for (const [sport, { planned, actual }] of sports) {
    const pill = document.createElement('div');
    pill.className = 'summary-pill';
    pill.innerHTML = `
      <span class="icon">${sportIcon(sport)}</span>
      <span class="value">${Math.round(actual)}min</span>
      ${planned > 0 ? `<span class="planned">/ ${Math.round(planned)}min</span>` : ''}
    `;
    strip.appendChild(pill);
  }
  // Slot into the header placeholder (second child of .week-header)
  const header = section.querySelector('.week-header');
  if (header) header.replaceChild(strip, header.children[1]);
}

function openPanel(session, workout) {
  const sport = workout?.sport ?? session?.sport ?? 'bike';
  const date  = workout?.date ?? '—';

  document.getElementById('panelIcon').textContent     = sportIcon(sport);
  document.getElementById('panelTitle').textContent    = sessionTypeLabel(sport, session?.type ?? null, workout?.activity_name);
  document.getElementById('panelSubtitle').textContent = date;
  document.getElementById('panelBody').innerHTML       = buildPanelBody(session, workout);
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function buildPanelBody(session, workout) {
  const parts = [];

  if (workout) {
    const badgeClass = workout.status === 'complete' ? 'badge-complete'
                     : (workout.status === 'awaiting_feedback' || workout.status === 'processing') ? 'badge-awaiting'
                     : 'badge-unplanned';
    const badgeText  = workout.status === 'awaiting_feedback' ? 'Awaiting feedback'
                     : workout.status === 'processing' ? 'Processing'
                     : workout.status === 'complete' ? 'Complete'
                     : esc(workout.status ?? 'Synced');
    parts.push(`<div style="margin-bottom:16px"><span class="status-badge ${badgeClass}">${badgeText}</span></div>`);
  }

  const rows = buildMetricsTable(workout, session);
  if (rows.length) {
    const hasPlanned = rows.some(([,p]) => p !== '—');
    parts.push(`
      <div class="panel-section">
        <table class="pva-table">
          <thead><tr><th></th>${hasPlanned ? '<th>Planned</th>' : ''}<th>Actual</th></tr></thead>
          <tbody>${rows.map(([label, planned, actual, cls]) =>
            `<tr><td>${label}</td>${hasPlanned ? `<td>${planned}</td>` : ''}<td class="${cls ?? ''}">${actual}</td></tr>`
          ).join('')}</tbody>
        </table>
      </div>`);
  }

  if (workout?.compliance_score != null) {
    const s   = workout.compliance_score;
    const cls = s >= 80 ? 'good' : s >= 60 ? 'ok' : 'poor';
    parts.push(`
      <div class="panel-section">
        <div class="panel-section-title">Compliance</div>
        <div class="compliance-bar-wrap">
          <div class="compliance-score-row">
            <span class="compliance-score-num ${cls}">${s}</span>
            <span class="compliance-label">/ 100</span>
          </div>
          <div class="compliance-bar-bg">
            <div class="compliance-bar-fill ${cls}" style="width:${Math.min(100, Math.max(0, Number(s) || 0))}%"></div>
          </div>
        </div>
      </div>`);
  }

  if (!workout && session?.coaching_notes) {
    parts.push(`
      <div class="panel-section">
        <div class="panel-section-title">Coach notes</div>
        <div class="coaching-report">${esc(session.coaching_notes)}</div>
      </div>`);
  }

  if (workout?.coaching_report) {
    // esc() first to prevent XSS, then apply bold markdown transform on the escaped string
    const report = esc(
      workout.coaching_report
        .replace(/^#+ .+/gm, '')
        .trim()
    ).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    parts.push(`
      <div class="panel-section">
        <div class="panel-section-title">Coaching report</div>
        <div class="coaching-report">${report}</div>
      </div>`);
  } else if (workout && workout.status !== 'awaiting_feedback') {
    parts.push(`
      <div class="panel-section">
        <div class="panel-section-title">Coaching report</div>
        <div class="coaching-report-empty">No coaching report yet.</div>
      </div>`);
  }

  if (workout?.feedback) {
    parts.push(`
      <div class="panel-section">
        <div class="panel-section-title">Your feedback</div>
        <div class="feedback-box">${esc(workout.feedback)}</div>
      </div>`);
  }

  if (session?.targets) {
    parts.push(`
      <div class="panel-section">
        <div class="panel-section-title">Session plan</div>
        <div class="coaching-report">${esc(formatTargets(session))}</div>
      </div>`);
  }

  return parts.join('');
}

function fmtPace100m(sec) {
  const m = Math.floor(sec / 60), s = Math.round(sec % 60);
  return `${m}:${String(s).padStart(2, '0')}/100m`;
}

// 3-4 key numbers shown as hero stats at top of panel
// Unified metrics table: [label, planned, actual, cssClass]
// planned = '—' when no target. actual = '—' when no workout yet.
function buildMetricsTable(workout, session) {
  const t = session?.targets ?? {};
  const w = workout;
  const sport = w?.sport ?? session?.sport;
  const rows = [];

  const p  = (val, unit) => val != null ? `${val}${unit ? ' ' + unit : ''}` : '—';
  const good = 'val-good', poor = 'val-poor', none = '';

  // Duration
  const plannedDur = session?.duration_min ? fmtDuration(session.duration_min) : '—';
  const actualDur  = w?.duration_min != null ? fmtDuration(w.duration_min) : '—';
  if (plannedDur !== '—' || actualDur !== '—') rows.push(['Duration', plannedDur, actualDur, none]);

  if (sport === 'bike') {
    // Distance
    if (w?.distance_km != null) rows.push(['Distance', '—', `${w.distance_km.toFixed(1)} km`, none]);

    // Avg Power / NP together
    if (w?.avg_power != null || w?.normalized_power != null) {
      const plannedPow = (t.power_min != null && t.power_max != null) ? `${t.power_min}–${t.power_max} W` : '—';
      const actualPow = [
        w?.avg_power != null ? `${w.avg_power}W avg` : null,
        w?.normalized_power != null ? `${w.normalized_power}W NP` : null,
      ].filter(Boolean).join(' / ');
      const inZone = w?.normalized_power != null && t.power_min != null
        ? (w.normalized_power >= t.power_min && w.normalized_power <= t.power_max + 10 ? good : poor)
        : none;
      rows.push(['Power', plannedPow, actualPow, inZone]);
    }

    // TSS
    const plannedTSS = t.tss_target != null ? String(t.tss_target) : '—';
    const actualTSS  = w?.tss != null ? String(Math.round(w.tss)) : '—';
    if (plannedTSS !== '—' || actualTSS !== '—') {
      const cls = (w?.tss != null && t.tss_target != null)
        ? (Math.round(w.tss) >= t.tss_target - 5 ? good : poor) : none;
      rows.push(['TSS', plannedTSS, actualTSS, cls]);
    }

    // IF
    if (w?.intensity_factor != null) rows.push(['IF', '—', String(w.intensity_factor), none]);

    // VI
    if (w?.variability_index != null || t.vi_max != null) {
      const plannedVI = t.vi_max != null ? `≤${t.vi_max}` : '—';
      const actualVI  = w?.variability_index != null ? String(w.variability_index) : '—';
      const cls = (w?.variability_index != null && t.vi_max != null)
        ? (w.variability_index <= t.vi_max ? good : poor) : none;
      rows.push(['VI', plannedVI, actualVI, cls]);
    }

  } else if (sport === 'run') {
    if (w?.distance_km != null) rows.push(['Distance', '—', `${w.distance_km.toFixed(2)} km`, none]);
    if (w?.avg_pace_sec != null) rows.push(['Pace', '—', `${formatPace(w.avg_pace_sec)} /km`, none]);
    if (w?.tss != null || t.tss_target != null) {
      const cls = (w?.tss != null && t.tss_target != null)
        ? (w.tss >= t.tss_target * 0.9 ? good : poor) : none;
      rows.push(['TSS', p(t.tss_target, ''), p(w?.tss != null ? Math.round(w.tss) : null, ''), cls]);
    }

  } else if (sport === 'swim') {
    const plannedDist = t.total_distance_m != null ? `${t.total_distance_m} m` : '—';
    const actualDist  = w?.distance_km != null ? `${Math.round(w.distance_km * 1000)} m` : '—';
    if (plannedDist !== '—' || actualDist !== '—') {
      const cls = (w?.distance_km != null && t.total_distance_m != null)
        ? (Math.round(w.distance_km * 1000) >= t.total_distance_m * 0.95 ? good : poor) : none;
      rows.push(['Distance', plannedDist, actualDist, cls]);
    }
    const cssSec = t.main_set?.css_target_sec_per_100m;
    const plannedPace = cssSec != null ? fmtPace100m(cssSec) : '—';
    const actualPace  = w?.avg_pace_sec != null ? fmtPace100m(w.avg_pace_sec) : '—';
    if (plannedPace !== '—' || actualPace !== '—') {
      const cls = (w?.avg_pace_sec != null && cssSec != null)
        ? (w.avg_pace_sec <= cssSec * 1.05 ? good : poor) : none;
      rows.push(['Pace /100m', plannedPace, actualPace, cls]);
    }
    if (w?.tss != null) rows.push(['sTSS', '—', String(Math.round(w.tss)), none]);
  }

  // HR — all endurance sports
  if (sport !== 'strength') {
    if (w?.min_hr != null || w?.avg_hr != null || w?.max_hr != null) {
      const hrStr = [
        w?.min_hr != null ? `${w.min_hr} min` : null,
        w?.avg_hr != null ? `${w.avg_hr} avg` : null,
        w?.max_hr != null ? `${w.max_hr} max` : null,
      ].filter(Boolean).join(' / ');
      rows.push(['HR (bpm)', '—', hrStr, none]);
    }
    if (w?.hr_drift != null) rows.push(['HR Drift', '—', `${w.hr_drift > 0 ? '+' : ''}${w.hr_drift}%`, none]);
  }

  // Calories
  if (w?.calories != null) rows.push(['Calories', '—', `${w.calories} kcal`, none]);

  return rows;
}

function formatTargets(session) {
  const t     = session.targets ?? {};
  const lines = [];
  if (session.sport === 'bike') {
    if (t.warmup)               lines.push(`Warmup: ${t.warmup}`);
    if (t.main_set)             lines.push(`Main: ${t.main_set}`);
    if (t.cooldown)             lines.push(`Cooldown: ${t.cooldown}`);
  }
  if (session.sport === 'swim') {
    if (t.main_set?.description) lines.push(t.main_set.description);
  }
  if (session.sport === 'strength') {
    (t.exercises || []).forEach(e => {
      lines.push(`${e.name}: ${e.sets}×${e.reps ?? (e.distance_m + 'm')}${e.per_side ? '/side' : ''}`);
    });
    if (t.mobility_min) lines.push(`Mobility: ${t.mobility_min}min ${t.mobility_focus || ''}`);
  }
  if (session.coaching_notes) lines.push('', `Notes: ${session.coaching_notes}`);
  return lines.join('\n');
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

document.getElementById('todayBtn').addEventListener('click', () => {
  if (todayWeekEl) todayWeekEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
});
document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closePanel(); });

async function init() {
  try {
    const [planRes, workoutsRes] = await Promise.all([
      fetch('plan.json'),
      fetch('workouts.json'),
    ]);
    if (!planRes.ok)     throw new Error(`plan.json: ${planRes.status}`);
    if (!workoutsRes.ok) throw new Error(`workouts.json: ${workoutsRes.status}`);
    plan     = await planRes.json();
    workouts = await workoutsRes.json();
    render();
  } catch (err) {
    document.getElementById('calendarWrap').innerHTML =
      `<div style="padding:40px;color:#ef4444">Failed to load data: ${esc(err.message)}</div>`;
  }
}

init();
  </script>
