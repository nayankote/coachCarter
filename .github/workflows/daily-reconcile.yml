name: Daily Reconcile

on:
  schedule:
    - cron: '30 16 * * *'   # 10pm IST (16:30 UTC)
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: node scripts/daily-reconcile.js
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ATHLETE_EMAIL:        ${{ secrets.ATHLETE_EMAIL }}
          AGENTMAIL_API_KEY:    ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX:      ${{ secrets.AGENTMAIL_INBOX }}
